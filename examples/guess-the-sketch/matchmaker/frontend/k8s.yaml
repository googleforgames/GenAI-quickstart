apiVersion: v1
kind: Service
metadata:
  name: guess-the-sketch-frontend
spec:
  selector:
    app: guess-the-sketch-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guess-the-sketch-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guess-the-sketch-frontend
  template:
    metadata:
      labels:
        app: guess-the-sketch-frontend
    spec:
      containers:
        - name: guess-the-sketch-frontend
          image: guess-the-sketch-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
